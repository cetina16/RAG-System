<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --accent:    #6c63ff;
      --accent2:   #4ade80;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ef4444;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent); }
    #status-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: #1e2535;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    #status-badge.ok { color: var(--accent2); border-color: var(--accent2); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Upload zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,0.06);
    }
    #drop-zone svg { opacity: 0.4; margin-bottom: 8px; }
    #drop-zone p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    #drop-zone p strong { color: var(--text); }
    #file-input { display: none; }

    /* Upload progress */
    #upload-status { font-size: 0.8rem; color: var(--muted); min-height: 18px; }
    #upload-status.success { color: var(--accent2); }
    #upload-status.error   { color: var(--danger); }

    /* Progress bar */
    .progress-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }
    .stat .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    /* Indexed files */
    #file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-item {
      font-size: 0.78rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .file-item svg { flex-shrink: 0; color: var(--accent); }
    .file-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Reset btn */
    #reset-btn {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 6px;
      padding: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    #reset-btn:hover { background: rgba(239,68,68,0.08); }

    /* ── Main chat area ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 780px;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .msg.user .avatar  { background: var(--accent); color: white; }
    .msg.assistant .avatar { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

    .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.88rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: rgba(108,99,255,0.12);
      border-color: rgba(108,99,255,0.3);
    }

    /* Citations */
    .citations {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .citation-tag {
      font-size: 0.72rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--muted);
      cursor: default;
      position: relative;
    }
    .citation-tag:hover { border-color: var(--accent); color: var(--text); }

    /* Trace badge */
    .trace-info {
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .trace-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* Typing cursor */
    .cursor::after {
      content: "▋";
      animation: blink 1s step-start infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
    #empty-state svg { opacity: 0.2; }
    #empty-state h2 { font-size: 1rem; color: var(--text); }
    #empty-state p  { font-size: 0.84rem; max-width: 320px; line-height: 1.6; }

    /* Input bar */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    #query-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 12px 14px;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    #query-input:focus { border-color: var(--accent); }
    #query-input::placeholder { color: var(--muted); }

    .bar-right { display: flex; gap: 8px; align-items: center; }

    .stream-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .toggle-switch {
      width: 32px; height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
      cursor: pointer;
    }
    .toggle-switch.on { background: var(--accent); }
    .toggle-switch::after {
      content: "";
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: left 0.2s;
    }
    .toggle-switch.on::after { left: 17px; }

    #send-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 42px; height: 42px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: 0.85; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>RAG <span>System</span></h1>
  <div id="status-badge">Connecting…</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>

    <!-- Upload -->
    <div>
      <div class="section-title">Ingest PDF</div>
      <div id="drop-zone">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p><strong>Click or drag a PDF</strong><br/>to ingest into the index</p>
        <input type="file" id="file-input" accept=".pdf" />
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div id="upload-status" style="margin-top:8px;"></div>
    </div>

    <!-- Stats -->
    <div>
      <div class="section-title">Index Stats</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="val" id="stat-docs">—</div>
          <div class="lbl">Documents</div>
        </div>
        <div class="stat">
          <div class="val" id="stat-cache">—</div>
          <div class="lbl">Cached</div>
        </div>
      </div>
    </div>

    <!-- Indexed files -->
    <div style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="section-title">Indexed Files</div>
      <div id="file-list" style="overflow-y:auto; flex:1;">
        <div class="file-item" style="justify-content:center;">No files yet</div>
      </div>
    </div>

    <!-- Reset -->
    <button id="reset-btn">Reset Index</button>

  </aside>

  <!-- Chat -->
  <main>
    <div id="messages">
      <div id="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        <h2>Ask anything about your documents</h2>
        <p>Upload a PDF on the left, then type a question below. Responses are grounded in your documents with source citations.</p>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="query-input" rows="1" placeholder="Ask a question about your documents…"></textarea>
      <div class="bar-right">
        <label class="stream-toggle" title="Stream tokens as they are generated">
          <div class="toggle-switch on" id="stream-toggle"></div>
          Stream
        </label>
        <button id="send-btn" title="Send (Enter)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let streaming = true;
  let busy      = false;

  // ── Elements ──────────────────────────────────────────────────────────────
  const messagesEl    = document.getElementById("messages");
  const emptyState    = document.getElementById("empty-state");
  const queryInput    = document.getElementById("query-input");
  const sendBtn       = document.getElementById("send-btn");
  const streamToggle  = document.getElementById("stream-toggle");
  const statusBadge   = document.getElementById("status-badge");
  const dropZone      = document.getElementById("drop-zone");
  const fileInput     = document.getElementById("file-input");
  const uploadStatus  = document.getElementById("upload-status");
  const progressWrap  = document.getElementById("progress-wrap");
  const progressBar   = document.getElementById("progress-bar");
  const resetBtn      = document.getElementById("reset-btn");

  // ── Health polling ────────────────────────────────────────────────────────
  async function refreshHealth() {
    try {
      const r = await fetch("/api/v1/health");
      const d = await r.json();
      statusBadge.textContent = `${d.index_documents} docs indexed`;
      statusBadge.className   = "ok";
      document.getElementById("stat-docs").textContent  = d.index_documents;
      document.getElementById("stat-cache").textContent = d.cache.size;
    } catch {
      statusBadge.textContent = "Offline";
      statusBadge.className   = "";
    }
  }

  async function refreshDocuments() {
    try {
      const r = await fetch("/api/v1/documents");
      const d = await r.json();
      const list = document.getElementById("file-list");
      if (!d.files || d.files.length === 0) {
        list.innerHTML = `<div class="file-item" style="justify-content:center;">No files yet</div>`;
        return;
      }
      list.innerHTML = d.files.map(f => `
        <div class="file-item" title="${f.filename}">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span>${f.filename}</span>
        </div>`).join("");
    } catch {}
  }

  refreshHealth();
  refreshDocuments();
  setInterval(refreshHealth, 15000);

  // ── Streaming toggle ──────────────────────────────────────────────────────
  streamToggle.addEventListener("click", () => {
    streaming = !streaming;
    streamToggle.classList.toggle("on", streaming);
  });

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  queryInput.addEventListener("input", () => {
    queryInput.style.height = "auto";
    queryInput.style.height = Math.min(queryInput.scrollHeight, 140) + "px";
  });

  queryInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  });

  sendBtn.addEventListener("click", sendQuery);

  // ── Messages ──────────────────────────────────────────────────────────────
  function hideEmpty() {
    if (emptyState) emptyState.style.display = "none";
  }

  function addMessage(role, text = "") {
    hideEmpty();
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addCitations(bubble, citations) {
    if (!citations || citations.length === 0) return;
    const row = document.createElement("div");
    row.className = "citations";
    citations.forEach(c => {
      const tag = document.createElement("div");
      tag.className = "citation-tag";
      const score = c.rerank_score !== null ? ` · ${c.rerank_score.toFixed(2)}` : "";
      tag.textContent = `[Doc ${c.doc_index}] ${c.source} p.${c.page ?? "?"}${score}`;
      tag.title = c.snippet;
      row.appendChild(tag);
    });
    bubble.appendChild(row);
  }

  function addTrace(bubble, trace, cacheHit) {
    if (!trace || !trace.total_latency_ms) return;
    const row = document.createElement("div");
    row.className = "trace-info";

    const pills = [
      { label: `${Math.round(trace.total_latency_ms)}ms total` },
      ...(cacheHit ? [{ label: "cache hit" }] : []),
      ...Object.entries(trace.node_timings_ms || {}).map(([k, v]) => ({
        label: `${k}: ${Math.round(v)}ms`
      }))
    ];

    pills.forEach(p => {
      const el = document.createElement("span");
      el.className = "trace-pill";
      el.textContent = p.label;
      row.appendChild(el);
    });
    bubble.appendChild(row);
  }

  // ── Send query ────────────────────────────────────────────────────────────
  async function sendQuery() {
    const query = queryInput.value.trim();
    if (!query || busy) return;

    busy = true;
    sendBtn.disabled = true;
    queryInput.value = "";
    queryInput.style.height = "auto";

    addMessage("user", query);
    const bubble = addMessage("assistant");
    bubble.classList.add("cursor");

    try {
      if (streaming) {
        await sendStreaming(query, bubble);
      } else {
        await sendStandard(query, bubble);
      }
    } catch (err) {
      bubble.textContent = `Error: ${err.message}`;
    } finally {
      bubble.classList.remove("cursor");
      busy = false;
      sendBtn.disabled = false;
      refreshHealth();
    }
  }

  async function sendStreaming(query, bubble) {
    const resp = await fetch("/api/v1/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, top_k: 10, stream: true })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let citations = [];
    let text      = "";
    let buffer    = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6).trim();
        if (raw === "[DONE]") break;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === "meta") {
            citations = ev.citations || [];
          } else if (ev.type === "token") {
            text += ev.content;
            bubble.textContent = text;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch {}
      }
    }

    addCitations(bubble, citations);
  }

  async function sendStandard(query, bubble) {
    const resp = await fetch("/api/v1/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, top_k: 10, stream: false })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const d = await resp.json();

    bubble.textContent = d.response;
    addCitations(bubble, d.citations);
    addTrace(bubble, d.trace, d.cache_hit);
  }

  // ── PDF Upload ────────────────────────────────────────────────────────────
  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) uploadFile(fileInput.files[0]);
    fileInput.value = "";
  });

  async function uploadFile(file) {
    if (!file.name.toLowerCase().endsWith(".pdf")) {
      setUploadStatus("Only PDF files are supported.", "error");
      return;
    }

    setUploadStatus(`Uploading ${file.name}…`, "");
    progressWrap.style.display = "block";
    animateProgress();

    const form = new FormData();
    form.append("file", file);

    try {
      const resp = await fetch("/api/v1/ingest", { method: "POST", body: form });
      const d    = await resp.json();

      if (!resp.ok) {
        setUploadStatus(d.detail || "Upload failed.", "error");
        return;
      }

      setUploadStatus(
        `${d.filename}: ${d.pages_extracted} pages → ${d.chunks_created} chunks (${Math.round(d.duration_ms)}ms)`,
        "success"
      );
      refreshHealth();
      refreshDocuments();
    } catch (err) {
      setUploadStatus(`Upload error: ${err.message}`, "error");
    } finally {
      progressWrap.style.display = "none";
      progressBar.style.width = "0%";
    }
  }

  function animateProgress() {
    let w = 0;
    const iv = setInterval(() => {
      w = Math.min(w + Math.random() * 15, 85);
      progressBar.style.width = w + "%";
      if (progressWrap.style.display === "none") clearInterval(iv);
    }, 200);
  }

  function setUploadStatus(msg, cls) {
    uploadStatus.textContent = msg;
    uploadStatus.className   = cls;
  }

  // ── Reset index ───────────────────────────────────────────────────────────
  resetBtn.addEventListener("click", async () => {
    if (!confirm("This will delete the entire FAISS index. Are you sure?")) return;
    try {
      const r = await fetch("/api/v1/index", { method: "DELETE" });
      const d = await r.json();
      setUploadStatus(d.message || "Index reset.", "success");
      refreshHealth();
      refreshDocuments();
    } catch (err) {
      setUploadStatus("Reset failed: " + err.message, "error");
    }
  });
</script>
</body>
</html>
