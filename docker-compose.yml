version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-system:latest
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      # Persist FAISS index and PDFs outside the container
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - FAISS_INDEX_PATH=data/faiss_index
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
